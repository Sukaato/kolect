[print_schema]
file = "src/infrastructure/db/schema.rs"
custom_type_derives = ["diesel::query_builder::QueryId", "Clone"]
filter = { except_tables = ["groups_fts", "artists_fts", "collection_groups_fts", "collection_artists_fts"] }

[migrations_directory]
dir = "migrations"