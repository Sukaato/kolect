name: Dataset Tests

on:
  push:
    paths:
      - "src-tauri/src/infrastucture/db/schema.rs"
      - "src-tauri/migrations/**"
      - "public/dataset.json"
      - "tests/**"
  pull_request:
    paths:
      - "src-tauri/src/infrastucture/db/schema.rs"
      - "src-tauri/migrations/**"
      - "public/dataset.json"
      - "tests/**"

concurrency:
  group: dataset-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/workflows/actions/setup-bun

      - name: Run Vitest
        run: bun test
