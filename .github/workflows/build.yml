name: Build

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  build-front:
    name: Build — Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/workflows/actions/setup-bun

      - name: Build
        uses: ./.github/workflows/actions/build-front

  build-back:
    name: Build — Backend
    runs-on: ubuntu-latest
    needs: build-front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/workflows/actions/setup-rust

      - name: Build
        uses: ./.github/workflows/actions/build-back

  build-android:
    name: Build — Android
    runs-on: ubuntu-latest
    needs: build-front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/workflows/actions/setup-bun

      - name: Setup Rust
        uses: ./.github/workflows/actions/setup-rust

      - name: Compute artifact suffix
        id: suffix
        shell: bash
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=pr-${{ github.event.pull_request.number }}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "value=${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        uses: ./.github/workflows/actions/build-android
        with:
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
          artifact-suffix: ${{ steps.suffix.outputs.value }}
