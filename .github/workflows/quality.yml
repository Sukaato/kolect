name: Quality

on:
  push:
  pull_request:
    branches:
      - main

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-front:
    name: Quality — Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: ./.github/workflows/actions/setup-bun

      - name: Quality
        uses: ./.github/workflows/actions/quality-front

  quality-back:
    name: Quality — Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: ./.github/workflows/actions/setup-bun

      - name: Setup Rust
        uses: ./.github/workflows/actions/setup-rust

      - name: Quality
        uses: ./.github/workflows/actions/quality-back
