name: Build Android
description: Build Tauri Android APK and AAB

inputs:
  keystore-base64:
    description: Base64-encoded keystore file
    required: true
  keystore-password:
    description: Keystore password
    required: true
  key-alias:
    description: Key alias
    required: true
  key-password:
    description: Key password
    required: true
  artifact-suffix:
    description: Suffix appended to artifact names (e.g. pr-42-abc1234 or v1.2.3)
    required: false
    default: ${{ github.sha }}

runs:
  using: composite
  steps:
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      shell: bash
      run: |
        sdkmanager "ndk;27.0.12077973"
        echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

    - name: Install Android targets
      shell: bash
      run: |
        rustup target add \
          aarch64-linux-android \
          armv7-linux-androideabi \
          i686-linux-android \
          x86_64-linux-android

    - name: Decode keystore
      shell: bash
      run: |
        echo "${{ inputs.keystore-base64 }}" | base64 --decode \
          > src-tauri/gen/android/app/kolect.keystore

    - name: Download dist artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Build APK
      shell: bash
      env:
        KEYSTORE_PATH: kolect.keystore
        KEYSTORE_PASSWORD: ${{ inputs.keystore-password }}
        KEY_ALIAS: ${{ inputs.key-alias }}
        KEY_PASSWORD: ${{ inputs.key-password }}
        ANDROID_NDK_HOME: ${{ env.NDK_HOME }}
      run: bun tauri android build --apk

    - name: Build AAB
      shell: bash
      env:
        KEYSTORE_PATH: kolect.keystore
        KEYSTORE_PASSWORD: ${{ inputs.keystore-password }}
        KEY_ALIAS: ${{ inputs.key-alias }}
        KEY_PASSWORD: ${{ inputs.key-password }}
        ANDROID_NDK_HOME: ${{ env.NDK_HOME }}
      run: bun tauri android build --aab

    - name: Upload APK artifact
      uses: actions/upload-artifact@v6
      with:
        name: kolect-${{ inputs.artifact-suffix }}.apk
        path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        retention-days: 14

    - name: Upload AAB artifact
      uses: actions/upload-artifact@v6
      with:
        name: kolect-${{ inputs.artifact-suffix }}.aab
        path: src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
        retention-days: 14
