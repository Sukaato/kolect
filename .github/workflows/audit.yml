name: Audit

on:
  push:
  pull_request:
    branches:
      - main

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-front:
    name: Audit — Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: ./.github/workflows/actions/setup-bun

      - name: Audit
        uses: ./.github/workflows/actions/audit-front

  audit-back:
    name: Audit — Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/workflows/actions/setup-rust

      - name: Audit
        uses: ./.github/workflows/actions/audit-back
